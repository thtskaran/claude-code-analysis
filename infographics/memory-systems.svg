  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Memory Systems Architecture</text>
  <text x="40" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Primary Systems</text>
  <rect x="30" y="130" width="420" height="200" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="240" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Memdir Semantic Memory</text>
  <text x="45" y="172" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">~/.claude-code/memory/</text>
  <text x="45" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">MEMORY.md + topics/</text>
  <text x="45" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">4-type taxonomy:</text>
  <text x="45" y="236" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">user, feedback, project, ref</text>
  <text x="45" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Max 5 selected</text>
  <text x="45" y="284" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">200 lines / 25KB cap</text>
  <rect x="480" y="130" width="420" height="200" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="690" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Team Memory Sync</text>
  <text x="495" y="172" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Pull-push replication</text>
  <text x="495" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">SHA256 delta, ETag cache</text>
  <text x="495" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Conflict: last-write wins</text>
  <text x="495" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="495" y="236" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">44 gitleaks security rules</text>
  <text x="495" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="495" y="268" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Encryption at rest</text>
  <rect x="930" y="130" width="420" height="200" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1140" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Session Memory</text>
  <text x="945" y="172" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Init 10K tokens</text>
  <text x="945" y="188" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Growth +5K per call</text>
  <text x="945" y="204" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Tool calls +3 each</text>
  <text x="945" y="220" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="945" y="236" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Keep last 50 messages</text>
  <text x="945" y="252" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Summarize older history</text>
  <text x="40" y="380" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#8B5CF6">Background &amp; State</text>
  <rect x="30" y="410" width="420" height="200" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="240" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">autoDream Consolidation</text>
  <text x="45" y="452" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Every 24h or 5 sessions</text>
  <text x="45" y="468" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Consolidate via Claude</text>
  <text x="45" y="484" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Extract key insights</text>
  <text x="45" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="516" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Update MEMORY.md +</text>
  <text x="45" y="532" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">topic summaries</text>
  <rect x="480" y="410" width="420" height="200" rx="12" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="690" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">AppState Reactive Store</text>
  <text x="495" y="452" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">565+ reactive properties</text>
  <text x="495" y="468" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">useSyncExternalStore</text>
  <text x="495" y="484" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="495" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">currentSessionId, uiMode,</text>
  <text x="495" y="516" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">commandHistory,</text>
  <text x="495" y="532" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">permissionCache</text>
  <rect x="930" y="410" width="420" height="200" rx="12" fill="#FEFCE8" stroke="#EAB308" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1140" y="430" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Context Compaction</text>
  <text x="945" y="452" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">9-section summary format</text>
  <text x="945" y="468" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Summarize, extract</text>
  <text x="945" y="484" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Re-inject !mem refs</text>
  <text x="945" y="500" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="945" y="516" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Compact 50% of original</text>
  <text x="40" y="660" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#6B7280">Ancillary</text>
  <rect x="30" y="690" width="420" height="100" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="240" y="710" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">MagicDocs</text>
  <text x="45" y="732" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Forked agent + file watcher</text>
  <text x="45" y="748" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">inotify monitoring</text>
  <text x="40" y="840" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6">Data Flow &amp; Hierarchy</text>
  <rect x="40" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="55" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">SESSION</text>
  <line x1="180" y1="905" x2="220" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="220" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="235" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">EXTRACT</text>
  <line x1="360" y1="905" x2="400" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="400" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="415" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">MEMDIR</text>
  <line x1="540" y1="905" x2="580" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="580" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="595" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">TEAM SYNC</text>
  <line x1="720" y1="905" x2="760" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="760" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="775" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">autoDream</text>
  <line x1="900" y1="905" x2="940" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="940" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="955" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">COMPACT</text>
  <line x1="1080" y1="905" x2="1120" y2="905" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <rect x="1120" y="870" width="140" height="70" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="1135" y="890" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">AppState</text>
  <rect x="30" y="1000" width="1340" height="80" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="45" y="1020" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Level 1 (Ephemeral): SessionMemory -&gt; AppState</text>
  <text x="45" y="1036" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Level 2 (Persistent Local): Memdir -&gt; autoDream -&gt; MEMORY.md</text>
  <text x="45" y="1052" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Level 3 (Persistent Remote): Team Sync (SHA256, gitleaks)</text>
