<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .text-primary { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .text-code { fill: #e6edf3; font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace; font-size: 12px; }
      .text-title { fill: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; }
      .text-small { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; }
      .box { fill: #1c2128; stroke: #30363d; stroke-width: 1.5; }
      .box-accent { fill: #0969da; stroke: #0969da; stroke-width: 1.5; }
      .box-service { fill: #238636; stroke: #238636; stroke-width: 1.5; }
      .line { stroke: #30363d; stroke-width: 1.5; fill: none; }
      .arrow { stroke: #58a6ff; stroke-width: 2; fill: none; }
      .arrow-head { fill: #58a6ff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="600"/>

  <!-- Title -->
  <text x="400" y="25" class="text-title" text-anchor="middle">Claude Code Architecture Overview</text>

  <!-- REPL / UI Layer -->
  <rect x="250" y="50" width="300" height="50" class="box-accent" rx="4"/>
  <text x="400" y="82" class="text-primary" text-anchor="middle">REPL / UI Layer</text>

  <!-- Arrow down -->
  <path d="M 400 100 L 400 130" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Agent Loop Container -->
  <rect x="150" y="130" width="500" height="220" class="box" rx="4" stroke-dasharray="5,5"/>
  <text x="160" y="150" class="text-code">Agent Loop (async generator)</text>

  <!-- 5 Phases -->
  <g id="phase1">
    <rect x="170" y="170" width="90" height="45" class="box" rx="3"/>
    <text x="215" y="190" class="text-primary" text-anchor="middle" font-size="12">Preprocessing</text>
  </g>

  <g id="phase2">
    <rect x="270" y="170" width="90" height="45" class="box" rx="3"/>
    <text x="315" y="190" class="text-primary" text-anchor="middle" font-size="12">Model Call</text>
  </g>

  <g id="phase3">
    <rect x="370" y="170" width="90" height="45" class="box" rx="3"/>
    <text x="415" y="190" class="text-primary" text-anchor="middle" font-size="12">Tool Execution</text>
  </g>

  <g id="phase4">
    <rect x="470" y="170" width="90" height="45" class="box" rx="3"/>
    <text x="515" y="190" class="text-primary" text-anchor="middle" font-size="12">Attachment</text>
    <text x="515" y="206" class="text-primary" text-anchor="middle" font-size="12">Processing</text>
  </g>

  <g id="phase5">
    <rect x="570" y="170" width="70" height="45" class="box" rx="3"/>
    <text x="605" y="190" class="text-primary" text-anchor="middle" font-size="12">Termination</text>
    <text x="605" y="206" class="text-primary" text-anchor="middle" font-size="12">Check</text>
  </g>

  <!-- Phase arrows -->
  <path d="M 260 192.5 L 270 192.5" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 360 192.5 L 370 192.5" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 460 192.5 L 470 192.5" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 560 192.5 L 570 192.5" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Loop back -->
  <path d="M 605 215 L 605 260 L 215 260 L 215 215" class="arrow" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="160" y="265" class="text-code" font-size="11">while(true)</text>

  <!-- Service Layer label -->
  <text x="160" y="390" class="text-title" font-size="13">Service Layer</text>

  <!-- Service boxes -->
  <g id="service1">
    <rect x="170" y="410" width="110" height="50" class="box-service" rx="3"/>
    <text x="225" y="435" class="text-primary" text-anchor="middle" font-size="12">API Client</text>
  </g>

  <g id="service2">
    <rect x="290" y="410" width="100" height="50" class="box-service" rx="3"/>
    <text x="340" y="435" class="text-primary" text-anchor="middle" font-size="12">Compaction</text>
  </g>

  <g id="service3">
    <rect x="400" y="410" width="80" height="50" class="box-service" rx="3"/>
    <text x="440" y="435" class="text-primary" text-anchor="middle" font-size="12">Tools</text>
  </g>

  <g id="service4">
    <rect x="490" y="410" width="80" height="50" class="box-service" rx="3"/>
    <text x="530" y="435" class="text-primary" text-anchor="middle" font-size="12">Hooks</text>
  </g>

  <g id="service5">
    <rect x="580" y="410" width="80" height="50" class="box-service" rx="3"/>
    <text x="620" y="435" class="text-primary" text-anchor="middle" font-size="12">MCP</text>
  </g>

  <g id="service6">
    <rect x="670" y="410" width="110" height="50" class="box-service" rx="3"/>
    <text x="725" y="435" class="text-primary" text-anchor="middle" font-size="12">Analytics</text>
  </g>

  <!-- Data flow arrows from agent loop to services -->
  <path d="M 225 350 L 225 410" class="line"/>
  <path d="M 340 350 L 340 410" class="line"/>
  <path d="M 440 350 L 440 410" class="line"/>
  <path d="M 530 350 L 530 410" class="line"/>
  <path d="M 620 350 L 620 410" class="line"/>
  <path d="M 725 350 L 725 410" class="line"/>

  <!-- Return flow -->
  <path d="M 280 435 L 280 490 L 520 490 L 520 435" class="line" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <text x="170" y="540" class="text-small">Streaming data flow</text>
  <path d="M 170 548 L 195 548" class="arrow" marker-end="url(#arrowhead)"/>

  <text x="320" y="540" class="text-small">Control flow</text>
  <path d="M 320 548 L 345 548" class="line" stroke-dasharray="3,3"/>

  <text x="450" y="540" class="text-small">Async generator yields</text>
  <path d="M 450 548 L 475 548" class="arrow" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head"/>
    </marker>
  </defs>
</svg>