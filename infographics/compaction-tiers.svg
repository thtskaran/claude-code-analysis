<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" width="1100px" height="600px" style="background-color: #ffffff">
  <defs>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset in="SourceGraphic" dx="0" dy="2"/>
      <feGaussianBlur in="offsetblur" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94A3B8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EF4444"/>
    </marker>
  </defs>
  <text x="40" y="45" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" fill="#10B981">Three-Tier Compaction System</text>
  <rect x="30" y="100" width="320" height="450" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="190" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Tier 1: Microcompact</text>
  <text x="45" y="142" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Two paths:</text>
  <text x="45" y="158" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* Time-based (&gt;60min)</text>
  <text x="45" y="174" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* Cached (cache_edits)</text>
  <text x="45" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="206" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Old tool results cleared</text>
  <text x="45" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="238" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Whitelisted tools:</text>
  <text x="45" y="254" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Read, Bash, Grep,</text>
  <text x="45" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Glob, WebSearch,</text>
  <text x="45" y="286" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">WebFetch, Edit, Write</text>
  <text x="45" y="302" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="318" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Cost: Free</text>
  <text x="45" y="334" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Quality: Low</text>
  <text x="45" y="350" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="45" y="366" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Circuit: Skip</text>
  <text x="45" y="382" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">after 3 failures</text>
  <rect x="380" y="100" width="320" height="450" rx="12" fill="#EBF5FF" stroke="#3B82F6" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="540" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Tier 2: Full Compact</text>
  <text x="395" y="142" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">* Strip Images</text>
  <text x="395" y="158" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* Compact Prompt</text>
  <text x="395" y="174" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">  (forked agent)</text>
  <text x="395" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* PTL Retry</text>
  <text x="395" y="206" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">  (max 3x)</text>
  <text x="395" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="395" y="238" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* Post-Restore</text>
  <text x="395" y="254" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">  5 files, 50K budget</text>
  <text x="395" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="395" y="286" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* NO_TOOLS guard</text>
  <text x="395" y="302" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="395" y="318" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Cost: Medium</text>
  <text x="395" y="334" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Quality: High</text>
  <text x="395" y="350" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="395" y="366" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Best for:</text>
  <text x="395" y="382" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Large contexts</text>
  <rect x="730" y="100" width="320" height="450" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="890" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Tier 3: Session Mem</text>
  <text x="745" y="142" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#333333">Pre-built by</text>
  <text x="745" y="158" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Background Agents</text>
  <text x="745" y="174" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="745" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Keeps:</text>
  <text x="745" y="206" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* 10K tokens</text>
  <text x="745" y="222" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* 5 messages</text>
  <text x="745" y="238" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">* max 40K budget</text>
  <text x="745" y="254" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="745" y="270" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">9 Sections * 2K tokens</text>
  <text x="745" y="286" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">System | Transcript</text>
  <text x="745" y="302" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Decisions | Files | Tools</text>
  <text x="745" y="318" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="745" y="334" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Cost: Free</text>
  <text x="745" y="350" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Quality: Medium</text>
  <text x="745" y="366" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666"/>
  <text x="745" y="382" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#666666">Always available</text>
  <line x1="350" y1="325" x2="380" y2="325" stroke="#10B981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="700" y1="325" x2="730" y2="325" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
</svg>
